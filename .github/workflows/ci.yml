name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  syntaxcheck:
    name: Syntax Check
    runs-on: ubuntu-latest
    container:
      image: condaforge/miniforge3:24.9.2-0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        run: |
          mamba env create -n tronmake -f environment.yaml
          git config --global --add safe.directory "$(pwd)"
          conda run -n tronmake pytest --tag dryrun --git-aware --symlink --stderr-bytes 100000 --kwd --basetemp /tmp/test

  linting:
    name: Linting
    runs-on: ubuntu-latest
    container:
      image: condaforge/miniforge3:24.9.2-0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libmagic1
        run: apt update && apt install -y libmagic1

      - name: Run Snakemake Lint
        run: |
          mamba env create -n tronmake -f environment.yaml
          git config --global --add safe.directory "$(pwd)"
          conda run -n tronmake snakemake --lint

  integration:
    name: Integration Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: condaforge/miniforge3:24.9.2-0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create Conda Environment
        run: conda env create -n tronmake -f environment.yaml

      - name: Trust Git directory
        run: git config --global --add safe.directory "$(pwd)"
      
      - name: Install apptainer dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt-get update \
          && DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt-get install -y --no-install-recommends zip ca-certificates curl wget gnupg2 squashfs-tools git
      
      - name: Install apptainer
        run: |
          conda create -q -y -c conda-forge -n apptainer apptainer

      - name: Disable apparmor namespace restrictions for apptainer (os='Linux')
        if: runner.os == 'Linux'
        run: |
          sh -c 'echo kernel.apparmor_restrict_unprivileged_userns=0 \
              >/etc/sysctl.d/90-disable-userns-restrictions.conf'
          sysctl -p /etc/sysctl.d/90-disable-userns-restrictions.conf

      - name: Run Integration Tests
        run: |
          export PATH=/opt/conda/envs/apptainer/bin:${PATH}
          conda run -n tronmake pytest --tag integrationtest --git-aware --symlink --stderr-bytes 100000 --kwd --basetemp /tmp/test
