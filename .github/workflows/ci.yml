name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  syntaxcheck:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git submodule update
      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
      - run: |
          pixi run test-syntax

  lint:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - run: |
          git submodule update
      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
      - run: |
          pixi run lint


  integration:
    name: Integration Tests
    if: github.event_name == 'pull_request'
    #runs-on: ${{ fromJSON( github.repository_owner != 'TRON-Private' &&
    #  '["ubuntu-24.04"]' || github.ref_name == 'main' && '["ubuntu-24.04"]' || '["self-hosted", "ubuntu-24.04"]'
    #  ) }}
    runs-on: ubuntu-latest
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      WORKSPACE: ${{ github.workspace }}
      APPTAINER_HPC: ${{ github.workspace }}/.cache/apptainer
    steps:
      - run: df -h
      - name: "ubuntu-cleanup"
        # this should increase free space from ~21gb to ~38gb
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo docker builder prune -a
      - run: df -h
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            pipeline:
              - '!**.md'
              - '!docs/**'
              - '!documentation/**'
      - uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.4.1
      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true

      - name: Trust Git directory
        run: git config --global --add safe.directory "$(pwd)"

      - name: Prepare container cache directories
        run: |
          mkdir -p "${XDG_CACHE_HOME}"
          mkdir -p "${APPTAINER_HPC}"

      - name: Run Integration Tests
        shell: bash -l {0}
        run: |
          pixi run test-ci

      - name: Clean up
        run: |
          rm -rf .snakemake
          rm -rf results
      - run: df -h
        if: ${{ always() }}
          
