# Input file section
sample_sheet: 'tests/pep/samples.tsv'
sra_mode: false
index_dir: 'REDACTED /file:config/config.yaml'
interleaved_input: false
bam_input: false

# Tool configuration
fraser:
  min_read: 5
  mapq_filter: 255

star:
  min_read: 15

requantify:
  interval_mode: true
  allow_mismatches: false
  bowtie_k_threshold: 200
  cts_size: 1000

# Chromosome filtering
chrom-filter:
  - chr1
  - chr2
  - chr3
  - chr4
  - chr5
  - chr6
  - chr7
  - chr8
  - chr9
  - chr10
  - chr11
  - chr12
  - chr13
  - chr14
  - chr15
  - chr16
  - chr17
  - chr18
  - chr19
  - chr21
  - chr20
  - chr22
  - chrX
  - chrY
  - chrM
