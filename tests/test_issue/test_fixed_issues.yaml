# Test star alignment uses sample prefix for output and multiqc report contains STAR metrics with sample name
- name: test_issue_142_fixed
  tags:
    - localintegrationtest
  command: >
    snakemake -p 
      --sdm apptainer
      -j 4
      --until multiqc
      --apptainer-prefix ${APPTAINER_HPC}
      --apptainer-args "--bind /tmp --bind ${WORKSPACE}"
  files:
    - path: "results/Hugo_Pt10/star/Hugo_Pt10_SJ.out.tab"
    - path: "results/Hugo_Pt10/star/Hugo_Pt10_Log.final.out"
    - path: "results/report/multiqc_data/star_alignment_plot.txt"
      contains:
        - "Hugo_Pt10"
    - path: "results/report/multiqc_data/star_summary_table.txt"
      contains:
        - "Hugo_Pt10"

