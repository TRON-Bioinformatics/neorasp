# Test that splice2neo scatter gather approach works when just one file is yielded by split
- name: test_issue_140_fixed
  tags:
    - localintegrationtest
  command: >
    snakemake -p 
      --sdm apptainer
      -j 4
      --configfile tests/test_issue/configs/140_config.yaml
      --until only_splice2neo
      --apptainer-prefix ${APPTAINER_HPC}
      --apptainer-args "--bind /tmp --bind ${WORKSPACE}"
  files:
    - path: "results/Hugo_Pt10/fetchdata/sj_final_neofox_annotation.tsv"
    - path: "results/Hugo_Pt10/fetchdata/sj_final_peptides.fasta"
    - path: "results/Hugo_Pt10/fetchdata/splice2neo/sj_annotated_peptide.tsv"

