- name: test_full_run_replicates
  tags:
    - integrationtest
    - ci
  command: >
    snakemake -p 
      --sdm apptainer -j 4
      --configfile tests/splicing_replicates.yaml
      --apptainer-args "--bind /tmp --bind ${GITHUB_WORKSPACE} --bind ${XDG_CACHE_HOME}/snakemake/"
      --apptainer-prefix ~/.apptainer/cache

