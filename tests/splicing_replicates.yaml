sra_mode: false
sample_sheet: 'tests/pep/samples_rep.tsv'
interleaved_input: false
bam_input: false


fraser:
  min_read: 2
  mapq_filter: 255
star:
  min_read: 2
  ref: tests/resources/tron_genome_lib/indices/star

requantify:
  interval_mode: true
  allow_mismatches: false
  bowtie_k_threshold: 200
  cts_size: 1000

reliable_calls:
  min_junction_usage: 0.01
  min_junction_cpm: 0.1

splice2neo:
  peptide_flank_size: 13
  scatter_size: 50

reference:
  genome: 'tests/resources/tron_genome_lib/resources/ref_genome.fasta'
  annotation: 'tests/resources/tron_genome_lib/resources/ref_annot.gtf'
  annotation_bed: 'tests/resources/tron_genome_lib/resources/ref_annot.bed'
  cdna: 'tests/resources/tron_genome_lib/resources/ref_transcripts.fasta'
  chromsizes: 'tests/resources/tron_genome_lib/resources/ref_genome.chrom.sizes'
  encode_mapability: 'tests/resources/tron_genome_lib/resources/mappability/encode_exclusion.bed'
  ucsc_mapability: 'tests/resources/tron_genome_lib/resources/mappability/ucsc_problematic.bed'
  ref_transcripts: 'tests/resources/tron_genome_lib/indices/R/ref_transcripts.Rds'
  ref_cds: 'tests/resources/tron_genome_lib/indices/R/ref_cds.Rds'
  tx2gene: 'tests/resources/tron_genome_lib/resources/ref_annot_transcript2gene.tsv'
  gene2symbol: 'tests/resources/tron_genome_lib/resources/ref_annot_gene2symbol.tsv2'
  2bit: 'tests/resources/tron_genome_lib/indices/R/ref_genome.2bit'
  canonical_juncs: tests/resources/tron_genome_lib/resources/ref_annot_splice_sites.tsv
  rmsk: tests/resources/tron_genome_lib/resources/ref_rmsk.Rds
