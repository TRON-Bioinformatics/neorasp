.mkdocs:
  image: condaforge/miniforge3:24.7.1-2
  stage: deploy
  script:
    - apt update && apt install -y libmagic1
    - mamba env create -n mkdocs -f environment.yaml
    - source /opt/conda/bin/activate mkdocs
    - git clone https://github.com/OpenOmics/snakevision.git
    - pip install snakevision/requirements.txt
    - snakemake --configfile tests/splicing.yaml --rulegraph --forceall > documentation/tronmake-rna-splicing/docs/assets/pipeline_rulegraph.dot
    - ./snakevision/bin/snakevision -s all docstring_export -o documentation/tronmake-rna-splicing/docs/assets/pipeline_rulegraph.svg documentation/tronmake-rna-splicing/docs/assets/pipeline_rulegraph.dot
    - snakemake -p --until docstring_export --configfile tests/splicing.yaml
    - mkdocs build -f documentation/tronmake-rna-splicing/mkdocs.yml -d ../../public
  artifacts:
    paths:
      - public

pages:
  extends: .mkdocs

